<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF IDE - Keyboard & Buttons</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #6c757d;
            --accent: #e67e22;
            --bg: #f8f9fa;
            --dark: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h2 { color: var(--dark); margin-top: 0; }

        /* エディタ部分 */
        textarea {
            width: 100%;
            height: 180px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 1.1rem;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus { border-color: var(--primary); }

        /* ボタン群のレイアウト */
        .toolbar {
            margin: 15px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .btn-group {
            display: flex;
            gap: 4px;
            background: #eee;
            padding: 5px;
            border-radius: 6px;
        }
        button {
            padding: 10px 15px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }
        button:active { transform: translateY(2px); }

        /* コマンドボタン */
        .cmd-btn { background: var(--dark); color: white; min-width: 45px; }
        .cmd-btn:hover { background: #34495e; }

        /* 特殊操作ボタン */
        .special-btn { background: #dcdde1; color: #2f3640; }
        .special-btn:hover { background: #ced6e0; }
        
        /* 実行ボタン系 */
        .run-btn { background: #27ae60; color: white; margin-left: auto; }
        .run-btn:hover { background: #219150; }
        .clear-btn { background: #e74c3c; color: white; }

        /* 出力エリア */
        .output-box {
            margin-top: 20px;
            background: #1e1e1e;
            color: #dcdcdc;
            border-radius: 8px;
            padding: 15px;
            position: relative;
        }
        .output-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }
        #output {
            min-height: 80px;
            white-space: pre-wrap;
            font-family: 'Consolas', monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Brainfuck Compiler</h2>

    <div class="toolbar">
        <div class="btn-group">
            <button class="cmd-btn" onclick="insert('>')" title="ポインタを右へ">></button>
            <button class="cmd-btn" onclick="insert('<')" title="ポインタを左へ"><</button>
            <button class="cmd-btn" onclick="insert('+')" title="値をインクリメント">+</button>
            <button class="cmd-btn" onclick="insert('-')" title="値をデクリメント">-</button>
            <button class="cmd-btn" onclick="insert('.')" title="文字を出力">.</button>
            <button class="cmd-btn" onclick="insert(',')" title="入力を取得">,</button>
            <button class="cmd-btn" onclick="insert('[')" title="ループ開始">[</button>
            <button class="cmd-btn" onclick="insert(']')" title="ループ終了">]</button>
        </div>

        <div class="btn-group">
            <button class="special-btn" onclick="insert('\n')">↵ 改行</button>
            <button class="special-btn" onclick="backspace()">⌫ 削除</button>
        </div>

        <button class="clear-btn" onclick="clearAll()">クリア</button>
        <button class="run-btn" onclick="runBF()">実行 ▶</button>
    </div>

    <textarea id="code" spellcheck="false" placeholder="ここにコードを書くか、上のボタンを押してください...">++++++++[>++++[>++>+++>+++>+<<<<-]>+>+>->>+[<]<-]>>.>---.+++++++..+++.>>.<-.<.+++.------.--------.>>+.>++.</textarea>

    <div class="output-box">
        <span class="output-label">Terminal Output</span>
        <div id="output"></div>
    </div>
</div>

<script>
    const editor = document.getElementById('code');
    const outputElement = document.getElementById('output');

    // 指定した文字列をカーソル位置に挿入する関数
    function insert(char) {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const text = editor.value;
        
        // 文字を挿入してテキストを更新
        editor.value = text.substring(0, start) + char + text.substring(end);

        // カーソル位置を挿入した文字の直後に移動
        const newPos = start + char.length;
        editor.setSelectionRange(newPos, newPos);
        
        // テキストエリアにフォーカスを戻す（キーボード入力を続けやすくする）
        editor.focus();
    }

    // 削除（バックスペース）機能
    function backspace() {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const text = editor.value;

        if (start === end) {
            // 範囲選択されていない場合は1文字削除
            if (start > 0) {
                editor.value = text.substring(0, start - 1) + text.substring(end);
                editor.setSelectionRange(start - 1, start - 1);
            }
        } else {
            // 範囲選択されている場合はその範囲を削除
            editor.value = text.substring(0, start) + text.substring(end);
            editor.setSelectionRange(start, start);
        }
        editor.focus();
    }

    function clearAll() {
        if(confirm("コードをすべて消去しますか？")) {
            editor.value = '';
            outputElement.textContent = '';
        }
    }

    // Brainfuck 実行エンジン
    function runBF() {
        const source = editor.value;
        outputElement.textContent = '';
        const code = source.replace(/[^><\+\-\.,\[\]]/g, '');
        
        const memory = new Uint8Array(30000);
        let ptr = 0;
        let pc = 0;
        let result = "";

        // ジャンプテーブルの作成
        const stack = [];
        const jumps = {};
        for (let i = 0; i < code.length; i++) {
            if (code[i] === '[') stack.push(i);
            else if (code[i] === ']') {
                const start = stack.pop();
                jumps[start] = i;
                jumps[i] = start;
            }
        }

        let steps = 0;
        const maxSteps = 500000;

        try {
            while (pc < code.length && steps < maxSteps) {
                const cmd = code[pc];
                switch (cmd) {
                    case '>': ptr++; break;
                    case '<': ptr--; break;
                    case '+': memory[ptr]++; break;
                    case '-': memory[ptr]--; break;
                    case '.': result += String.fromCharCode(memory[ptr]); break;
                    case ',': 
                        const input = prompt("Input (1 character):");
                        memory[ptr] = input ? input.charCodeAt(0) : 0;
                        break;
                    case '[': if (memory[ptr] === 0) pc = jumps[pc]; break;
                    case ']': if (memory[ptr] !== 0) pc = jumps[pc]; break;
                }
                pc++;
                steps++;
            }
            if (steps >= maxSteps) result += "\n[Error: Timeout]";
            outputElement.textContent = result || "(出力なし)";
        } catch (e) {
            outputElement.textContent = "[Error]: " + e.message;
        }
    }
</script>

</body>
</html>
