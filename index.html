<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BFCompiler</title>
</head>
<body>
    <textarea id="bf-code" rows="10" cols="30"></textarea>
    <!-- Command buttons for Brainfuck instructions -->
    <div>
        <button onclick="appendCommand('+')">+</button>
        <button onclick="appendCommand('-')">-</button>
        <button onclick="appendCommand('>')">&gt;</button>
        <button onclick="appendCommand('<')">&lt;</button>
        <button onclick="appendCommand('.')">.</button>
        <button onclick="appendCommand(',')">,</button>
        <button onclick="appendCommand('[')">[</button>
        <button onclick="appendCommand(']')">]</button>
    </div>
    <div>
        <button id="run-button">Run</button>
        <button id="clear-button">Clear</button>
    </div>
    <script>
        function appendCommand(command) {
            document.getElementById('bf-code').value += command;
        }
    </script>
</body>
</html>
